name: Build blog from Notion

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-blog
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm ci || npm install

      - name: Build blog from Notion
        env:
          NOTION_BLOG_TOKEN: ${{ secrets.NOTION_BLOG_TOKEN }}
        run: node scripts/build-blog.mjs

      - name: Commit regenerated files
        run: |
          git config user.name  "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git add blog.html blog blog-assets
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild blog from Notion [skip ci]"
            git push
          fi
