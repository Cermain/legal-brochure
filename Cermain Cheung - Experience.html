  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ba(251, 251, 253, 0.92);\n    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);\n    border-bottom: 1px solid var(--rule);\n  }\n  .chrome-inner {\n    max-width: 1180px; margin: 0 auto; padding: 14px 32px;\n    display: flex; align-items: center; justify-content: space-between;\n    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;\n  }\n  .chrome .brand { color: var(--navy); font-weight: 600; display: flex; align-items: center; gap: 14px; }\n  .chrome .brand-logo { height: 34px; width: auto; display: block; }\n  .chrome .brand .assoc { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0.02em; font-size: 11px; padding-left: 14px; border-left: 1px solid var(--rule); }\n  @media (max-width: 640px) { .chrome .brand .assoc { display: none; } }\n  .lang-toggle { display: flex; gap: 4px; align-items: center; }\n  .lang-toggle button { background: transparent; border: 1px solid transparent; padding: 5px 11px; font-family: inherit; font-size: 12px; letter-spacing: 0.04em; color: var(--muted); border-radius: 999px; cursor: pointer; transition: all 0.15s ease; }\n  .lang-toggle button:hover { color: var(--navy); }\n  .lang-toggle button.is-active { color: var(--navy); border-color: var(--navy); background: white; font-weight: 600; }\n  :lang(zh-hant) .hero h1, :lang(zh-hant) .section-title, :lang(zh-hant) .comms h2, :lang(zh-hant) .tension h2, :lang(zh-hant) .cta-bottom h2, :lang(zh-hant) .insight p, :lang(zh-hant) .branch-q,\n  :lang(zh-hans) .hero h1, :lang(zh-hans) .section-title, :lang(zh-hans) .comms h2, :lang(zh-hans) .tension h2, :lang(zh-hans) .cta-bottom h2, :lang(zh-hans) .insight p, :lang(zh-hans) .branch-q {\n    font-family: 'Noto Serif TC','Noto Serif SC','Lora',Georgia,serif !important;\n  }\n  :lang(zh-hant) .hero-thesis p .q, :lang(zh-hans) .hero-thesis p .q { font-family: 'Noto Serif TC','Noto Serif SC','Lora',serif; }\n\n  /* ----- TOPIC NAV ----- */\n  .topic-nav { border-top: 1px solid var(--rule); }\n  .topic-nav-inner { max-width: 1180px; margin: 0 auto; padding: 0 32px; display: flex; align-items: stretch; gap: 2px; overflow-x: auto; scrollbar-width: none; }\n  .topic-nav-inner::-webkit-scrollbar { display: none; }\n  .tnav { position: relative; padding: 11px 15px; font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; color: var(--muted); text-decoration: none; white-space: nowrap; border-bottom: 2px solid transparent; transition: color .15s ease, border-color .15s ease; display: inline-flex; align-items: center; gap: 7px; }\n  .tnav:hover { color: var(--navy); }\n  .tnav.is-current { color: var(--navy); border-bottom-color: var(--sage); }\n  .tnav.soon { color: #b4b8c1; cursor: default; }\n  .tnav.soon i { font-style: normal; font-size: 8px; letter-spacing: 0.1em; color: var(--sage); border: 1px solid var(--sage-line); border-radius: 999px; padding: 1px 5px; line-height: 1; }\n  .tnav:first-child { padding-left: 0; }\n  @media print { .topic-nav { display: none !important; } }\n\n  section { padding: 96px 32px; }\n  .container { max-width: 1100px; margin: 0 auto; }\n\n  .section-eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--sage); font-weight: 600; margin-bottom: 18px; }\n  .section-title { font-size: clamp(30px, 3.2vw, 46px); font-weight: 300; color: var(--navy); letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 16px; }\n  .section-lead { font-size: 18px; line-height: 1.6; color: var(--ink); max-width: 720px; }\n  .section-lead em { font-style: italic; color: var(--navy); }\n\n  /* ----- HERO ----- */\n  .hero {\n    padding: 130px 32px 96px;\n    background:\n      linear-gradient(rgba(31, 56, 100, 0.035) 1px, transparent 1px) 0 0 / 100% 56px,\n      linear-gradient(90deg, rgba(31, 56, 100, 0.035) 1px, transparent 1px) 0 0 / 56px 100%,\n      var(--cream);\n    position: relative; overflow: hidden;\n  }\n  .hero-inner { max-width: 1100px; margin: 0 auto; position: :var(--sage-deep); }\n  .acc-body-inner { padding:0 16px 30px 74px; }\n  .comms-xref { display:inline-flex; align-items:center; gap:9px; margin-top:30px; color:#fff; text-decoration:none; font-weight:600; font-size:15px; border-bottom:1px solid var(--sage); padding-bottom:4px; transition:gap .2s ease; }\n  .comms-xref:hover { gap:14px; }\n  :lang(zh-hant) .acc-t, :lang(zh-hans) .acc-t { font-family:'Noto Serif TC','Noto Serif SC','Lora',Georgia,serif; }\n  @media print { .acc-body { max-height:none !important; } .acc-chev { display:none; } .comms-xref { color:var(--navy); } }\n<\u002Fstyle>\n<style>h1,h2,.section-title,.branch-q,.acc-t,.hero-thesis p{text-wrap:balance;}<\u002Fstyle>\n<style id=\"exp-styles\">\n  .draftbar{background:var(--amber-tint);border-bottom:1px solid var(--amber-line);color:var(--amber);font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;text-align:center;padding:7px 16px}\n  .breadth{background:#fff;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}\n  .breadth-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:42px}\n  @media(max-width:760px){.breadth-grid{grid-template-columns:1fr;gap:32px}}\n  .breadth-col h3{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--sage-deep);font-weight:600;margin-bottom:18px;padding-bottom:11px;border-bottom:1px solid var(--rule)}\n  .bchips{display:flex;flex-wrap:wrap;gap:9px}\n  .bchip{font-size:14px;color:var(--ink);background:var(--cream-warm);border:1px solid var(--rule);border-radius:999px;padding:7px 15px;font-weight:500}\n  .matters-sec{background:var(--cream-warm)}\n  .mfilter{display:flex;flex-wrap:wrap;gap:8px;margin:36px 0 4px}\n  .mfbtn{font-family:inherit;cursor:pointer;font-size:12.5px;letter-spacing:.02em;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--rule);border-radius:999px;padding:8px 16px;transition:all .15s ease}\n  .mfbtn:hover{color:var(--navy);border-color:var(--sage)}\n  .mfb 案件。\">No client names. Figures are limited to documented matters.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mfilter reveal\" role=\"tablist\" aria-label=\"Filter matters\">\n      <button class=\"mfbtn on\" data-filter=\"all\" data-en=\"All\" data-zh-hant=\"全部\" data-zh-hans=\"全部\">All<\u002Fbutton>\n      <button class=\"mfbtn\" data-filter=\"ma\" data-en=\"M&amp;A &amp; strategic\" data-zh-hant=\"併購與策略\" data-zh-hans=\"并购与战略\">M&amp;A &amp; strategic<\u002Fbutton>\n      <button class=\"mfbtn\" data-filter=\"xb\" data-en=\"Cross-border\" data-zh-hant=\"跨境\" data-zh-hans=\"跨境\">Cross-border<\u002Fbutton>\n      <button class=\"mfbtn\" data-filter=\"reg\" data-en=\"Regulatory\" data-zh-hant=\"監管\" data-zh-hans=\"监管\">Regulatory<\u002Fbutton>\n      <button class=\"mfbtn\" data-filter=\"entry\" data-en=\"Market entry\" data-zh-hant=\"進入市場\" data-zh-hans=\"进入市场\">Market entry<\u002Fbutton>\n      <button class=\"mfbtn\" data-filter=\"corp\" data-en=\"Corporate\" data-zh-hant=\"公司事務\" data-zh-hans=\"公司事务\">Corporate<\u002Fbutton>\n      <button class=\"mfbtn\" data-filter=\"gov\" data-en=\"Government VC\" data-zh-hant=\"政府創投\" data-zh-hans=\"政府创投\">Government VC<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"mgroups reveal\">\n      <div class=\"mgroup\" data-cat=\"ma\">\n        <div class=\"mgroup-label\"><span class=\"ct\">01<\u002Fspan><span data-en=\"Major M&amp;A &amp; strategic\" data-zh-hant=\"重大併購與策略交易\" data-zh-hans=\"重大并购与战略交易\">Major M&amp;A &amp; strategic<\u002Fspan><\u002Fdiv>\n        <div class=\"mgrid\">\n        <div class=\"mcard\"><span class=\"mc-tag\" data-en=\"Deal of the Year\" data-zh-hant=\"年度交易\" data-zh-hans=\"年度交易\">Deal of the Year<\u002Fspan><h4 data-en=\"HKEX-listed logistics group\" data-zh-hant=\"港交所上市物流集團\" data-zh-hans=\"港交所上市物流集团\">HKEX-listed logistics group<\u002Fh4><p data-en=\"10+ acquisitions and JV formations over a decade; the latest acquired &lt;b&gt;30+ overseas subsidiaries at RMB 4B+&lt;/b&gt; — Deal of the Year, &lt an>\n      <span class=\"meta\">© 2026 Cermain Cheung Chiu Nam<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // ----- LANGUAGE TOGGLE -----\n  const STORAGE_KEY = 'oln-brochure-lang';\n  const langButtons = document.querySelectorAll('.lang-toggle button');\n  function setLang(lang) {\n    document.documentElement.setAttribute('lang', lang);\n    const attr = 'data-' + lang;\n    document.querySelectorAll('[data-en]').forEach(el => {\n      const val = el.getAttribute(attr);\n      if (val !== null) el.innerHTML = val;\n    });\n    langButtons.forEach(b => b.classList.toggle('is-active', b.dataset.lang === lang));\n    try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}\n  }\n  langButtons.forEach(btn => btn.addEventListener('click', () => setLang(btn.dataset.lang)));\n  try {\n    const saved = localStorage.getItem(STORAGE_KEY);\n    if (saved && ['en','zh-hant','zh-hans'].includes(saved)) setLang(saved);\n  } catch (e) {}\n\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(entry => {\n      if (entry.isIntersecting) {\n        entry.target.classList.add('is-visible');\n        io.unobserve(entry.target);\n      }\n    });\n  }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n<\u002Fscript>\n\n<script>\n(function(){\n  var wheel = document.querySelector('.wheel');\n  if(!wheel) return;\n  var nodes = Array.prototype.slice.call(document.querySelectorAll('.wnode'));\n  var panels = Array.prototype.slice.call(document.querySelectorAll('.wpanel'));\n  var hubNum = document.querySelector('.hub-num');\n  function setActive(i){\n    nodes.forEach(function(n){ var on = (+n.dataset.i===i); n.classList.toggle('on', on); n.setAttribute('aria-selected', on?'true':'false'); n.setAttribute('tabindex', on?'0':'-1'); });\n    panels.forEach(function(p){ p.classList.toggle('is-active', (+p.dataset.i===i)); });\n    if(hubNum){ hubNum.textContent = '0'+(i+1); }\n  }\n  nodes.forEach(function(n){\n    var i = +n.dataset.i;\n    n.addEventListener('click', function(){ setActive(i); });\n    n.addEventListener('mouseenter', function(){ setActive(i); });\n    n.addEventListener('focus', function(){ setActive(i); });\n    n.addEventListener('keydown', function(ev){\n      var idx;\n      if(ev.key==='ArrowRight'||ev.key==='ArrowDown') idx=(i+1)%nodes.length;\n      else if(ev.key==='ArrowLeft'||ev.key==='ArrowUp') idx=(i-1+nodes.length)%nodes.length;\n      else return;\n      ev.preventDefault(); nodes[idx].focus();\n    });\n  });\n  setActive(0);\n})();\n<\u002Fscript>\n<script>\n(function(){\n  var heads = document.querySelectorAll('.acc-head');\n  if(!heads.length) return;\n  heads.forEach(function(h){\n    h.addEventListener('click', function(){ h.parentElement.classList.toggle('open'); });\n  });\n})();\n<\u002Fscript>\n<script>\n(function(){\n  var btns=document.querySelectorAll('.mfbtn');\n  var groups=document.querySelectorAll('.mgroup');\n  if(!btns.length) return;\n  btns.forEach(function(b){\n    b.addEventListener('click',function(){\n      btns.forEach(function(x){x.classList.toggle('on',x===b);});\n      var f=b.dataset.filter;\n      groups.forEach(function(g){ g.style.display=(f==='all'||g.dataset.cat===f)?'':'none'; });\n    });\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
